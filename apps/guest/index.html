<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <!--
      Viewport: NO `maximum-scale` / `user-scalable=no`. Disabling zoom breaks
      accessibility on iOS (WCAG 1.4.4). Anti-pattern in the brief.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FF5A1F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FlowPay" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <title>FlowPay</title>
    <style>
      /* Prevent the 300ms tap delay + double-tap zoom on iOS — kept minimal so
         it ships in the index.html cache and works before React hydrates. */
      html, body, #root {
        height: 100%;
        background: #fafafa;
      }
      body {
        margin: 0;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: contain;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
